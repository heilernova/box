@for (gym of list(); track $index) {
    <mat-card appearance="outlined">
        <mat-card-header>
            <div mat-card-avatar class="avatar">
                <img height="50" [src]="gym.avatar" [alt]="gym.name">
            </div>
            <mat-card-title>
                {{gym.name}}
            </mat-card-title>
            <mat-card-subtitle>
                {{gym.city}}
            </mat-card-subtitle>
        </mat-card-header>
    
        <mat-card-content>
            @if(gym.googleMaps){
                <a [href]="gym.googleMaps" target="_blank" rel="noopener noreferrer">
                    <i class="fa-solid fa-location-dot"></i>
                    Como llegar
                </a>
            }
        </mat-card-content>
    
        <mat-card-actions>
            <button mat-button>Contactar por WhatsApp</button>
        </mat-card-actions>
    </mat-card>
}
