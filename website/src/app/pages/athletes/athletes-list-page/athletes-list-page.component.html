<app-page>
    <app-page-content class="result">
        @for (athlete of list(); track $index) {
            <mat-card (click)="onClickPreview(athlete)" style="overflow: hidden;">
                <mat-card-content>
                    <div class="athlete-info-container">
                        <div class="avatar">

                        </div>
                        <div class="info">
                            <div class="title">
                                <div class="name">{{athlete.alias ?? (athlete.name + ' ' + athlete.lastName)}}</div>
                                <div class="verified">
                                    <i class="fa-solid fa-certificate"></i>
                                    <div class="check">
                                        <i class="fa-solid fa-check"></i>
                                    </div>
                                </div>
                            </div>
                            <div class="category">
                                Intermedio
                            </div>
                        </div>


                    </div>
                </mat-card-content>
            </mat-card>
        }
    </app-page-content>
</app-page>
