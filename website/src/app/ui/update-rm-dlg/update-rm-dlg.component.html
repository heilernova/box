<h2 mat-dialog-title>Actualizar RM</h2>
<mat-dialog-content>
    <h3>{{workoutName()}}</h3>
    <form [formGroup]="formGroup">
        <div style="display: flex; column-gap: 1em;">
            <mat-form-field>
                <mat-label>Unidad de medida</mat-label>
                <mat-select value="kilos" formControlName="unit">
                    <mat-option value="kilos">Kilos</mat-option>
                    <mat-option value="pounds">Libras</mat-option>
                </mat-select>
            </mat-form-field>
            <mat-form-field style="width: 7em;">
                <mat-label>Valor</mat-label>
                <mat-input-number matInput align="center" formControlName="value"/>
            </mat-form-field>
        </div>
    </form>
</mat-dialog-content>
<mat-dialog-actions>
    <button mat-button (click)="onClickSave()">Guardar</button>
</mat-dialog-actions>
