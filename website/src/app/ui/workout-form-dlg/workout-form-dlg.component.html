<h2 mat-dialog-title>Registrar ejercicio</h2>
<mat-dialog-content>
    <form [formGroup]="formGroup">
        <mat-form-field>
            <mat-label>Nombre en ingles</mat-label>
            <input matInput formControlName="nameInEnglish">
        </mat-form-field>
        <mat-form-field>
            <mat-label>Nombre en español</mat-label>
            <input matInput formControlName="nameInSpanish">
        </mat-form-field>
        <mat-form-field>
            <mat-label>Abreviatura</mat-label>
            <input matInput formControlName="abbreviation">
        </mat-form-field>

        <div style="display: flex; column-gap: 1em;">
            <mat-form-field style="width: 6em;">
                <mat-label>RM</mat-label>
                <mat-select formControlName="rm">
                    <mat-option [value]="true">Si</mat-option>
                    <mat-option [value]="false">No</mat-option>
                </mat-select>
            </mat-form-field>
            <mat-form-field style="width: 6em;">
                <mat-label>PR</mat-label>
                <mat-select formControlName="pr">
                    <mat-option [value]="true">Si</mat-option>
                    <mat-option [value]="false">No</mat-option>
                </mat-select>
            </mat-form-field>
        </div>

        <mat-form-field>
            <mat-label>URL YouTUbe</mat-label>
            <input matInput formControlName="youTube">
        </mat-form-field>
    </form>
</mat-dialog-content>
<mat-dialog-actions>
    <button mat-flat-button (click)="onClickSave()">Guardar</button>
</mat-dialog-actions>
